version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:13
    container_name: cluster_exam_db
    environment:
      POSTGRES_DB: cluster_exam_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secure_password_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cluster_exam_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cluster_exam_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      SECRET_KEY: "django-insecure-change-this-in-production"
      DATABASE_URL: "postgresql://admin:secure_password_change_me@db:5432/cluster_exam_db"
      REDIS_URL: "redis://redis:6379/0"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cluster_exam_celery
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    environment:
      DEBUG: "False"
      SECRET_KEY: "django-insecure-change-this-in-production"
      DATABASE_URL: "postgresql://admin:secure_password_change_me@db:5432/cluster_exam_db"
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      - db
      - redis
      - backend

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cluster_exam_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: "http://localhost:8000/api"
      REACT_APP_APP_NAME: "GHSS Totalai Cluster Exam System"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  default:
    name: cluster_exam_network
